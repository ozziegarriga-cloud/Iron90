<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron90 — 90 Day Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --card: #161616; --border: #222222;
    --accent: #e8ff00; --accent2: #ff4d00; --text: #f0f0f0; --muted: #555;
    --green: #00ff88; --red: #ff3b3b; --yt: #ff4444; --ss: #ff7a00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:999; opacity:0.4; }

  header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:var(--accent); text-shadow:0 0 20px rgba(232,255,0,0.3); }
  .logo span { color:var(--accent2); }
  .day-badge { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:2px; text-align:right; }
  .day-badge strong { color:var(--accent); font-size:1rem; display:block; }

  nav { display:flex; gap:4px; padding:10px 24px; border-bottom:1px solid var(--border); background:var(--surface); overflow-x:auto; }
  nav button { font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:1px; padding:6px 14px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap; text-transform:uppercase; }
  nav button.active, nav button:hover { background:var(--accent); color:#000; border-color:var(--accent); }

  main { max-width:860px; margin:0 auto; padding:24px 16px; }
  .view { display:none; }
  .view.active { display:block; }

  /* HERO */
  .today-hero { display:grid; grid-template-columns:1fr auto; align-items:start; gap:12px; margin-bottom:24px; }
  .muscle-tag { display:inline-block; font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:2px; text-transform:uppercase; padding:3px 9px; border:1px solid var(--accent2); color:var(--accent2); border-radius:2px; margin-bottom:6px; }
  .workout-title { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:2px; line-height:1; margin-bottom:4px; }
  .workout-meta { font-family:'DM Mono',monospace; font-size:0.67rem; color:var(--muted); letter-spacing:0.8px; }
  .complete-btn { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; letter-spacing:2px; padding:11px 20px; background:var(--accent); color:#000; border:none; cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap; }
  .complete-btn:hover { background:#fff; }
  .complete-btn.done { background:var(--green); }
  .garmin-btn { font-family:'DM Mono',monospace; font-size:0.63rem; letter-spacing:1.5px; padding:8px 14px; background:transparent; border:1px solid #1a5fa8; color:#4d9de0; cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap; text-transform:uppercase; width:100%; }
  .garmin-btn:hover { background:#001a33; border-color:#4d9de0; color:#90c8ff; }
  .garmin-import-steps { font-family:'DM Mono',monospace; font-size:0.72rem; line-height:2; color:var(--muted); }
  .garmin-import-steps strong { color:var(--text); display:block; margin-top:12px; margin-bottom:2px; font-size:0.78rem; }
  .garmin-import-steps .step { padding-left:12px; border-left:2px solid var(--border); margin-bottom:3px; }
  .garmin-success { color:var(--green); font-family:'DM Mono',monospace; font-size:0.78rem; letter-spacing:1px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .garmin-success::before { content:'✓'; display:inline-block; width:20px; height:20px; background:var(--green); color:#000; border-radius:50%; text-align:center; line-height:20px; font-size:0.7rem; flex-shrink:0; }

  /* SUPERSET */
  .superset-block { margin-bottom:18px; }
  .solo-block { margin-bottom:12px; }

  .superset-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .superset-badge { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--ss); background:#1a0e00; border:1px solid #3a2000; padding:3px 10px; border-radius:2px; white-space:nowrap; }
  .superset-line { flex:1; height:1px; background:linear-gradient(90deg,var(--ss),transparent); }

  .ss-rest-bar { display:flex; align-items:center; gap:8px; padding:5px 14px; margin:-1px 0; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:1.5px; color:var(--ss); background:linear-gradient(90deg,#1a0e00,transparent); border-left:2px solid var(--ss); }

  /* EXERCISE CARD */
  .exercise-card { background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden; transition:border-color 0.15s; }
  .exercise-card.in-ss { border-left:2px solid var(--ss); border-radius:0 4px 4px 0; }
  .exercise-card:hover { border-color:#2a2a2a; }

  .exercise-header { display:grid; grid-template-columns:1fr auto; align-items:center; padding:13px 15px; cursor:pointer; gap:10px; }
  .ex-top-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:3px; }
  .exercise-name { font-family:'Bebas Neue',sans-serif; font-size:1.22rem; letter-spacing:1px; }

  .yt-btn { display:inline-flex; align-items:center; gap:4px; font-family:'DM Mono',monospace; font-size:0.57rem; letter-spacing:1px; padding:3px 8px; border-radius:2px; border:1px solid #2a0a0a; background:#150505; color:var(--yt); text-decoration:none; transition:all 0.15s; white-space:nowrap; }
  .yt-btn:hover { background:var(--yt); color:#fff; border-color:var(--yt); }

  .exercise-info { font-family:'DM Mono',monospace; font-size:0.63rem; color:var(--muted); }
  .sets-summary { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--accent); letter-spacing:1px; white-space:nowrap; }
  .chevron { color:var(--muted); font-size:0.72rem; transition:transform 0.2s; margin-left:5px; }
  .exercise-card.open .chevron { transform:rotate(180deg); }

  .sets-panel { display:none; padding:0 15px 13px; border-top:1px solid var(--border); }
  .sets-panel.open { display:block; }

  .sets-grid { display:grid; grid-template-columns:30px 1fr 1fr 30px; gap:5px; align-items:center; margin-top:10px; }
  .sets-grid-header { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; padding-bottom:4px; border-bottom:1px solid var(--border); margin-bottom:2px; text-align:center; }
  .set-num { font-family:'DM Mono',monospace; font-size:0.76rem; color:var(--muted); text-align:center; }
  .set-input { background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.88rem; padding:7px 6px; border-radius:2px; width:100%; text-align:center; transition:border-color 0.15s; }
  .set-input:focus { outline:none; border-color:var(--accent); color:var(--accent); }
  .set-check { width:26px; height:26px; border:2px solid var(--border); background:transparent; cursor:pointer; border-radius:2px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:12px; margin:0 auto; }
  .set-check.checked { background:var(--accent); border-color:var(--accent); color:#000; }
  .prev-best { grid-column:1/-1; font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--muted); padding:5px 0; border-top:1px solid var(--border); margin-top:2px; }
  .prev-best span { color:var(--green); }
  .note-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.78rem; padding:7px 9px; border-radius:2px; margin-top:10px; resize:none; height:46px; }
  .note-input:focus { outline:none; border-color:var(--accent); }

  /* REST DAY */
  .rest-day-card { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:48px; text-align:center; }
  .rest-day-card .emoji { font-size:3rem; margin-bottom:12px; }
  .rest-day-card h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
  .rest-day-card p { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); }

  /* TAGS */
  .tag-pill { display:inline-block; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:1px; padding:2px 7px; border-radius:20px; margin-right:4px; text-transform:uppercase; }
  .tag-chest { background:#1a1500; color:#ffb800; border:1px solid #332500; }
  .tag-back { background:#001a1a; color:#00cccc; border:1px solid #003333; }
  .tag-legs { background:#1a000a; color:#ff4488; border:1px solid #330016; }
  .tag-shoulders { background:#0d0d1a; color:#8888ff; border:1px solid #1a1a33; }
  .tag-arms { background:#0a1a00; color:#88ff00; border:1px solid #1a3300; }
  .tag-core { background:#1a0a00; color:#ff8800; border:1px solid #331500; }
  .tag-full { background:#001a0a; color:#00ff88; border:1px solid #003319; }

  /* PROGRESS */
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; margin-bottom:20px; color:var(--accent); }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; }
  @media(max-width:500px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
  .stat-box { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:14px; text-align:center; }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; color:var(--accent); }
  .stat-label { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
  .progress-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:10px; }
  .progress-card { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:14px; cursor:pointer; transition:border-color 0.15s; }
  .progress-card:hover { border-color:var(--accent); }
  .progress-card-name { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:1px; margin-bottom:8px; }
  .progress-chart { display:flex; align-items:flex-end; gap:3px; height:42px; margin-bottom:8px; }
  .chart-bar { flex:1; background:var(--border); border-radius:1px; min-height:3px; }
  .chart-bar.latest { background:var(--accent); }
  .progress-stats { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted); }
  .progress-stats .val { color:var(--text); }
  .progress-stats .up { color:var(--green); }
  .progress-stats .down { color:var(--red); }

  /* CALENDAR */
  .cal-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; margin-bottom:24px; }
  @media(max-width:600px){ .cal-grid{grid-template-columns:repeat(7,1fr);} }
  .cal-day { aspect-ratio:1; border-radius:3px; border:1px solid var(--border); background:var(--card); display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:0.52rem; color:var(--muted); cursor:pointer; transition:all 0.15s; }
  .cal-day:hover { border-color:var(--accent); }
  .cal-day.completed { background:#1a2a00; border-color:#3a5a00; color:var(--green); }
  .cal-day.today { border-color:var(--accent); color:var(--accent); }
  .cal-day.rest { background:#1a1a1a; color:#333; }
  .cal-day.future { opacity:0.3; cursor:default; }
  .cal-legend { display:flex; gap:16px; font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted); margin-bottom:18px; flex-wrap:wrap; }
  .cal-legend span { display:flex; align-items:center; gap:6px; }
  .dot { width:10px; height:10px; border-radius:1px; }

  /* WEEK */
  .week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:24px; }
  .week-day { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:10px 6px; text-align:center; }
  .week-day.today { border-color:var(--accent); }
  .week-day.done { border-color:#3a5a00; background:#1a2a00; }
  .week-day-label { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--muted); letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }
  .week-day-muscle { font-family:'Bebas Neue',sans-serif; font-size:0.78rem; letter-spacing:0.5px; line-height:1.2; }
  .week-day.today .week-day-muscle { color:var(--accent); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:24px; max-width:460px; width:100%; max-height:80vh; overflow-y:auto; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px; margin-bottom:14px; color:var(--accent); }
  .history-entry { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:0.72rem; }
  .history-date { color:var(--muted); }
  .history-weight { color:var(--accent); }
  .modal-close { margin-top:18px; width:100%; padding:9px; background:var(--border); border:none; color:var(--text); font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:1px; cursor:pointer; border-radius:2px; }
  .modal-close:hover { background:#333; }

  .advance-btn { display:block; margin:24px auto 0; padding:10px 28px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:1px; cursor:pointer; border-radius:2px; transition:all 0.15s; }
  .advance-btn:hover { border-color:var(--accent); color:var(--accent); }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .superset-block, .solo-block { animation:fadeIn 0.2s ease both; }
  .superset-block:nth-child(2),.solo-block:nth-child(2){animation-delay:0.04s}
  .superset-block:nth-child(3),.solo-block:nth-child(3){animation-delay:0.08s}
  .superset-block:nth-child(4),.solo-block:nth-child(4){animation-delay:0.12s}
  .superset-block:nth-child(5),.solo-block:nth-child(5){animation-delay:0.16s}

  /* ── NUTRITION ── */
  .setup-card { background:var(--card); border:1px solid var(--accent); border-radius:4px; padding:24px; margin-bottom:24px; }
  .setup-card h3 { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; color:var(--accent); margin-bottom:16px; }
  .setup-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-bottom:14px; }
  .setup-field label { display:block; font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
  .setup-field input, .setup-field select { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.88rem; padding:8px 10px; border-radius:2px; }
  .setup-field input:focus, .setup-field select:focus { outline:none; border-color:var(--accent); }
  .setup-field select option { background:var(--surface); }
  .save-setup-btn { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; padding:10px 28px; background:var(--accent); color:#000; border:none; cursor:pointer; border-radius:2px; transition:all 0.15s; }
  .save-setup-btn:hover { background:#fff; }

  .macro-banner { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
  @media(max-width:480px){ .macro-banner{grid-template-columns:repeat(2,1fr);} }
  .macro-box { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:12px; text-align:center; position:relative; overflow:hidden; }
  .macro-box::after { content:''; position:absolute; bottom:0; left:0; height:3px; width:var(--fill,0%); transition:width 0.4s ease; }
  .macro-box.cal::after { background:var(--accent); }
  .macro-box.pro::after { background:#ff6b6b; }
  .macro-box.carb::after { background:#ffd93d; }
  .macro-box.fat::after { background:#6bcb77; }
  .macro-val { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:1px; line-height:1; }
  .macro-val.cal { color:var(--accent); }
  .macro-val.pro { color:#ff6b6b; }
  .macro-val.carb { color:#ffd93d; }
  .macro-val.fat { color:#6bcb77; }
  .macro-label { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-top:3px; }
  .macro-target { font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--muted); margin-top:2px; }

  .meal-section { margin-bottom:16px; }
  .meal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .meal-name { font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .meal-cals { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--accent); }
  .add-food-btn { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:1px; padding:4px 10px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; border-radius:2px; transition:all 0.15s; }
  .add-food-btn:hover { border-color:var(--accent); color:var(--accent); }

  .food-entry { display:grid; grid-template-columns:1fr repeat(4,auto); gap:6px; align-items:center; padding:8px 10px; background:var(--card); border:1px solid var(--border); border-radius:3px; margin-bottom:5px; }
  .food-name { font-family:'DM Sans',sans-serif; font-size:0.82rem; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .food-macro { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--muted); white-space:nowrap; }
  .food-macro.c { color:var(--accent); }
  .del-food { background:transparent; border:none; color:#333; cursor:pointer; font-size:0.8rem; padding:2px 4px; border-radius:2px; transition:color 0.15s; }
  .del-food:hover { color:var(--red); }

  /* add food drawer */
  .add-food-drawer { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px; margin-bottom:10px; display:none; }
  .add-food-drawer.open { display:block; }
  .drawer-title { font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:1.5px; color:var(--accent); text-transform:uppercase; margin-bottom:10px; }
  .food-search-row { display:flex; gap:6px; margin-bottom:10px; }
  .food-search-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:7px 10px; border-radius:2px; }
  .food-search-input:focus { outline:none; border-color:var(--accent); }
  .food-quick-list { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
  .food-quick-chip { font-family:'DM Mono',monospace; font-size:0.6rem; padding:4px 9px; border:1px solid var(--border); color:var(--muted); background:transparent; border-radius:20px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .food-quick-chip:hover { border-color:var(--accent); color:var(--accent); }
  .custom-food-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
  @media(max-width:500px){ .custom-food-grid{grid-template-columns:1fr 1fr;} }
  .custom-food-grid input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.8rem; padding:7px 8px; border-radius:2px; width:100%; }
  .custom-food-grid input:focus { outline:none; border-color:var(--accent); }
  .custom-food-grid input::placeholder { color:#333; font-size:0.7rem; }
  .log-food-btn { font-family:'Bebas Neue',sans-serif; font-size:0.9rem; letter-spacing:1.5px; padding:8px 18px; background:var(--accent); color:#000; border:none; cursor:pointer; border-radius:2px; width:100%; transition:all 0.15s; }
  .log-food-btn:hover { background:#fff; }

  .date-nav { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .date-nav-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.8rem; padding:5px 12px; cursor:pointer; border-radius:2px; transition:all 0.15s; }
  .date-nav-btn:hover { border-color:var(--accent); color:var(--accent); }

// Phase 2/3 swap exercise names (inherit same ss grouping + muscles)

const SCHEDULE = ['Chest + Triceps','Back + Biceps','Legs','Shoulders','Arms + Core','Full Body','REST'];

// ────────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────────
let S = JSON.parse(localStorage.getItem('iron90v2')||'null') || { currentDay:1, completedDays:{}, sets:{}, notes:{} };
const save = () => localStorage.setItem('iron90v2', JSON.stringify(S));

function getDayInfo(d) {
  const wi = (d-1) % 7;
  const pi = d<=21 ? 0 : d<=63 ? 1 : 2;
  const deload = (Math.floor((d-1)/7)+1) % 4 === 0 && wi < 6;
  const group = SCHEDULE[wi];
  if (group==='REST') return {group:'REST',pi,deload:false,exercises:[]};
  const names = PHASE_NAMES[pi][group];
  const base = GROUPS[group];
  const exercises = names.map((name,i) => {
    const b = base.exercises[i] || base.exercises[0];
    return { name, sets:deload?Math.max(2,b.sets-1):b.sets, reps:b.reps, muscles:b.muscles, ytSearch:YT[name]||b.ytSearch, ss:b.ss };
  });
  return {group, tag:base.tag, pi, deload, exercises};
}

function getBest(ex) {
  let best=null, bd=null;
  for (let d=1;d<S.currentDay;d++) for (let s=0;s<6;s++) {
    const e=S.sets[`${d}_${ex}_${s}`];
    if (e?.weight && parseFloat(e.weight)>(parseFloat(best)||0)) {best=e.weight;bd=d;}
  }
  return best?{weight:best,day:bd}:null;
}

function getHistory(ex) {
  let h=[];
  for (let d=1;d<=S.currentDay;d++) {
    let mx=null;
    for (let s=0;s<6;s++) { const e=S.sets[`${d}_${ex}_${s}`]; if(e?.weight&&parseFloat(e.weight)>(parseFloat(mx)||0)) mx=e.weight; }
    if (mx) h.push({day:d,weight:mx});
  }
  return h;
}

// ────────────────────────────────────────────────────
// VIEW SWITCHER
// ────────────────────────────────────────────────────
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  ({today:renderToday,week:renderWeek,progress:renderProgress,calendar:renderCalendar,nutrition:renderNutrition})[name]();
}

// ────────────────────────────────────────────────────
// TODAY
// ────────────────────────────────────────────────────
function renderToday() {
  const day = S.currentDay;
  document.getElementById('currentDayDisplay').textContent = day;
  const info = getDayInfo(day);
  const el = document.getElementById('todayContent');

  if (info.group==='REST') {
    el.innerHTML=`<div class="rest-day-card"><div class="emoji">😴</div><h2>REST DAY</h2><p>Day ${day} of 90 — Recovery is growth.</p><p style="margin-top:8px">Stretch. Walk. Sleep well.</p><button class="advance-btn" onclick="advanceDay()">NEXT DAY →</button></div>`;
    return;
  }

  const done = !!S.completedDays[day];
  const pNames = ['FOUNDATION','VOLUME','PEAK'];

  // Group exercises into superset blocks and solo blocks
  const groupMap = {};
  const order = [];
  info.exercises.forEach((ex,i) => {
    if (!ex.ss) { order.push({type:'solo',ex,i}); return; }
    if (!groupMap[ex.ss]) { groupMap[ex.ss]={type:'ss',label:ex.ss,items:[]}; order.push(groupMap[ex.ss]); }
    groupMap[ex.ss].items.push({ex,i});
  });

  let html = `<div class="today-hero">
    <div>
      <div class="muscle-tag">${info.group}${info.deload?' — DELOAD':''}</div>
      <div class="workout-title">${info.group.toUpperCase()}</div>
      <div class="workout-meta">Week ${Math.ceil(day/7)} · Phase ${info.pi+1}: ${pNames[info.pi]} · ${info.exercises.length} exercises · ⚡ Supersets for elevated HR</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:stretch;min-width:130px">
      <button class="complete-btn ${done?'done':''}" onclick="toggleDone(${day})">${done?'✓ DONE':'MARK DONE'}</button>
      ${done?`<button class="garmin-btn" onclick="exportToGarmin(${day})">⬇ GARMIN EXPORT</button>`:''}
    </div>
  </div>`;

  order.forEach(block => {
    if (block.type==='solo') {
      html += `<div class="solo-block">${exCard(block.ex, block.i, day, info.tag, false)}</div>`;
    } else {
      html += `<div class="superset-block">
        <div class="superset-header">
          <div class="superset-badge">⚡ SUPERSET ${block.label}</div>
          <div class="superset-line"></div>
          <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);white-space:nowrap">No rest between exercises</div>
        </div>`;
      block.items.forEach(({ex,i},j) => {
        html += exCard(ex, i, day, info.tag, true);
        if (j < block.items.length-1) html += `<div class="ss-rest-bar">⟳ &nbsp;REST 30–45 SEC, THEN NEXT EXERCISE IN SUPERSET</div>`;
      });
      html += `</div>`;
    }
  });

  html += `<button class="advance-btn" onclick="advanceDay()">ADVANCE TO DAY ${Math.min(day+1,90)} →</button>`;
  el.innerHTML = html;
  // Open first card
  const first = el.querySelector('.exercise-card');
  if (first) { first.classList.add('open'); document.getElementById('panel_'+first.dataset.i).classList.add('open'); }
}

function exCard(ex, i, day, tag, inSS) {
  const best = getBest(ex.name);
  const ytUrl = `https://www.youtube.com/results?search_query=${ex.ytSearch}`;
  const safeN = ex.name.replace(/'/g,"\\'");
  let sets = `<div class="sets-grid">
    <div class="set-num sets-grid-header">#</div>
    <div class="sets-grid-header">WEIGHT (lbs)</div>
    <div class="sets-grid-header">REPS</div>
    <div class="sets-grid-header">✓</div>`;
  for (let s=0;s<ex.sets;s++) {
    const k=`${day}_${ex.name}_${s}`, e=S.sets[k]||{};
    sets += `<div class="set-num">${s+1}</div>
      <input class="set-input" type="number" placeholder="lbs" value="${e.weight||''}" min="0" step="2.5" onchange="saveSet(${day},'${safeN}',${s},'weight',this.value)">
      <input class="set-input" type="number" placeholder="${ex.reps}" value="${e.reps||''}" min="0" onchange="saveSet(${day},'${safeN}',${s},'reps',this.value)">
      <div class="set-check ${e.done?'checked':''}" onclick="toggleSetDone(${day},'${safeN}',${s},this)">${e.done?'✓':''}</div>`;
  }
  if (best) sets += `<div class="prev-best">Previous best: <span>${best.weight} lbs</span> (Day ${best.day})</div>`;
  sets += `</div>`;
  const noteK = `${day}_${ex.name}_note`;
  const noteV = (S.notes[noteK]||'').replace(/'/g,"&#39;");

  return `<div class="exercise-card${inSS?' in-ss':''}" id="excard_${i}" data-i="${i}">
    <div class="exercise-header" onclick="toggleCard(${i})">
      <div>
        <div class="ex-top-row">
          <span class="exercise-name">${ex.name}</span>
          <a class="yt-btn" href="${ytUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ FORM VIDEO</a>
        </div>
        <div class="exercise-info"><span class="tag-pill tag-${tag}">${tag}</span>${ex.sets} sets × ${ex.reps} · ${ex.muscles}</div>
      </div>
      <div style="display:flex;align-items:center">
        <div class="sets-summary">${ex.sets}×${ex.reps}</div>
        <div class="chevron">▼</div>
      </div>
    </div>
    <div class="sets-panel" id="panel_${i}">${sets}
      <textarea class="note-input" placeholder="Notes for this exercise..." onchange="saveNote(${day},'${safeN}',this.value)">${noteV}</textarea>
    </div>
  </div>`;
}

function toggleCard(i) {
  const c=document.getElementById('excard_'+i), p=document.getElementById('panel_'+i);
  c.classList.toggle('open'); p.classList.toggle('open');
}
function saveSet(day,ex,s,f,v){const k=`${day}_${ex}_${s}`;if(!S.sets[k])S.sets[k]={};S.sets[k][f]=v;save();}
function toggleSetDone(day,ex,s,el){const k=`${day}_${ex}_${s}`;if(!S.sets[k])S.sets[k]={};S.sets[k].done=!S.sets[k].done;el.classList.toggle('checked');el.innerHTML=S.sets[k].done?'✓':'';save();}
function saveNote(day,ex,v){S.notes[`${day}_${ex}_note`]=v;save();}
function toggleDone(day){S.completedDays[day]=!S.completedDays[day];save();renderToday();}
function advanceDay(){if(S.currentDay<90){S.currentDay++;save();renderToday();}}

// ────────────────────────────────────────────────────
// WEEK
// ────────────────────────────────────────────────────
function renderWeek() {
  const day=S.currentDay, ws=Math.floor((day-1)/7)*7+1;
  const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  document.getElementById('weekStrip').innerHTML = Array.from({length:7},(_,i)=>{
    const d=ws+i, info=getDayInfo(d);
    const lbl=info.group==='REST'?'REST':info.group.split(' ')[0];
    return `<div class="week-day ${d===day?'today':''} ${S.completedDays[d]?'done':''}"><div class="week-day-label">${DAYS[i]}</div><div class="week-day-muscle">${lbl}</div></div>`;
  }).join('');

  document.getElementById('weekDetails').innerHTML = Array.from({length:7},(_,i)=>{
    const d=ws+i, info=getDayInfo(d);
    if (info.group==='REST') return '';
    return `<div style="margin-bottom:18px">
      <div style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:1px;margin-bottom:8px">${DAYS[i]} · DAY ${d}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${info.exercises.map(ex=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:3px;padding:7px 11px;font-family:'DM Mono',monospace;font-size:0.67rem">
          ${ex.ss?`<span style="color:var(--ss);font-size:0.56rem;margin-right:4px">⚡${ex.ss}</span>`:''}${ex.name} <span style="color:var(--muted)">${ex.sets}×${ex.reps}</span>
        </div>`).join('')}
      </div></div>`;
  }).join('');
}

// ────────────────────────────────────────────────────
// PROGRESS
// ────────────────────────────────────────────────────
function renderProgress() {
  const done=Object.values(S.completedDays).filter(Boolean).length;
  const sets=Object.values(S.sets).filter(s=>s.done).length;
  const ws=Object.values(S.sets).map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
  const maxW=ws.length?Math.max(...ws):0;
  let streak=0;
  for (let d=S.currentDay;d>=1;d--){if(getDayInfo(d).group==='REST')continue;if(S.completedDays[d])streak++;else break;}

  document.getElementById('globalStats').innerHTML=`
    <div class="stat-box"><div class="stat-val">${done}</div><div class="stat-label">Days Done</div></div>
    <div class="stat-box"><div class="stat-val">${sets}</div><div class="stat-label">Sets Logged</div></div>
    <div class="stat-box"><div class="stat-val">${maxW||'—'}</div><div class="stat-label">Max Weight</div></div>
    <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-label">Streak</div></div>`;

  const exSet=new Set();
  for (let d=1;d<=S.currentDay;d++) getDayInfo(d).exercises.forEach(ex=>exSet.add(ex.name));
  let grid='';
  [...exSet].forEach(name=>{
    const h=getHistory(name); if(!h.length)return;
    const ws=h.map(e=>parseFloat(e.weight)), mx=Math.max(...ws), last=ws[ws.length-1], prev=ws.length>1?ws[ws.length-2]:null;
    const delta=prev!=null?last-prev:null;
    const disp=h.slice(-10), dw=disp.map(e=>parseFloat(e.weight)), mdw=Math.max(...dw,1);
    const bars=dw.map((w,i)=>`<div class="chart-bar${i===dw.length-1?' latest':''}" style="height:${(w/mdw*100).toFixed(0)}%"></div>`).join('');
    const dStr=delta!=null?(delta>0?`<span class="up">↑${delta}</span>`:delta<0?`<span class="down">↓${Math.abs(delta)}</span>`:`<span>→</span>`):'';
    grid+=`<div class="progress-card" onclick="showHist('${name.replace(/'/g,"\\'")}')">
      <div class="progress-card-name">${name}</div>
      <div class="progress-chart">${bars}</div>
      <div class="progress-stats"><span>Best: <span class="val">${mx} lbs</span></span><span>Last: <span class="val">${last}</span> ${dStr}</span></div>
    </div>`;
  });
  document.getElementById('progressGrid').innerHTML=grid||`<p style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">Log weights to see progress charts here.</p>`;
}

// TCX GENERATOR — Garmin Connect Export
// TCX is plain XML — no binary encoding, guaranteed to work
// ════════════════════════════════════════════════════

function generateWorkoutTCX(dayNum, info) {
  const now = new Date();
  const totalSets = info.exercises.reduce((s, ex) => s + ex.sets, 0);
  const durationSec = totalSets * 110 + 300;
  const startTime = new Date(now.getTime() - durationSec * 1000);

  // Format to ISO 8601
  const fmt = d => d.toISOString();

  // Build exercise notes with logged weights
  const notes = info.exercises.map(ex => {
    const setLines = [];
    for (let s = 0; s < ex.sets; s++) {
      const k = `${dayNum}_${ex.name}_${s}`;
      const e = S.sets[k] || {};
      const w = e.weight ? `${e.weight}lbs` : '—';
      const r = e.reps   ? `${e.reps} reps` : ex.reps;
      setLines.push(`  Set ${s+1}: ${w} × ${r}`);
    }
    return `${ex.name} (${ex.sets}×${ex.reps})\n${setLines.join('\n')}`;
  }).join('\n\n');

  const calories = Math.round(totalSets * 8); // rough estimate

  const tcx = `<?xml version="1.0" encoding="UTF-8"?>
<TrainingCenterDatabase
  xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2 http://www.garmin.com/xmlschemas/TrainingCenterDatabasev2.xsd">
  <Activities>
    <Activity Sport="Other">
      <Id>${fmt(startTime)}</Id>
      <Lap StartTime="${fmt(startTime)}">
        <TotalTimeSeconds>${durationSec}</TotalTimeSeconds>
        <Calories>${calories}</Calories>
        <Intensity>Active</Intensity>
        <TriggerMethod>Manual</TriggerMethod>
      </Lap>
      <Notes>Iron90 — Day ${dayNum} — ${info.group}
Phase ${info.pi + 1} | Week ${Math.ceil(dayNum/7)}${info.deload ? ' | DELOAD' : ''}

${notes}</Notes>
    </Activity>
  </Activities>
</TrainingCenterDatabase>`;

  return tcx;
}

function exportToGarmin(day) {
  const info = getDayInfo(day);
  if (info.group === 'REST') return;

  try {
    const tcx = generateWorkoutTCX(day, info);
    const safeName = info.group.replace(/[^a-zA-Z0-9]/g, '_');
    const filename = `Iron90_Day${day}_${safeName}.tcx`;

    const blob = new Blob([tcx], {type: 'application/xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);

    document.getElementById('modalTitle').textContent = 'EXPORT TO GARMIN';
    document.getElementById('modalContent').innerHTML = `
      <div class="garmin-success">${filename} downloaded</div>
      <div class="garmin-import-steps">
        <strong>🖥 Step 1 — Go to Garmin Connect Web</strong>
        <div class="step">Open <strong style="color:var(--text);display:inline">connect.garmin.com</strong> in your browser and sign in</div>

        <strong>📤 Step 2 — Upload the file</strong>
        <div class="step">Click the <strong style="color:var(--text);display:inline">↑ cloud icon</strong> in the top-right corner</div>
        <div class="step">Select the <strong style="color:var(--text);display:inline">.tcx</strong> file from your Downloads folder</div>
        <div class="step">Click <strong style="color:var(--text);display:inline">Import</strong></div>

        <strong>📱 Finding the file</strong>
        <div class="step"><strong style="color:var(--text);display:inline">iPhone:</strong> Files app → On My iPhone → Downloads</div>
        <div class="step"><strong style="color:var(--text);display:inline">Android:</strong> Files → Downloads</div>

        <div style="margin-top:14px;padding:10px;background:#111;border:1px solid #222;border-radius:3px;font-size:0.65rem;color:var(--muted);line-height:1.8">
          The activity will show in Garmin Connect with the correct date, duration, and all your exercise notes including sets, reps, and weights. It syncs to your watch automatically.
        </div>
      </div>`;
    document.getElementById('modalOverlay').classList.add('open');
  } catch(e) {
    alert('Export error: ' + e.message);
  }
}

let nutDateOffset = 0; // 0 = today, -1 = yesterday, etc.
let activeDrawerMeal = null;

function nutDateKey(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10); // YYYY-MM-DD
}

function nutDateLabel(offset) {
  if (offset === 0) return 'TODAY';
  if (offset === -1) return 'YESTERDAY';
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── Calorie / macro targets from profile ──────────────────
function calcTargets(profile) {
  if (!profile || !profile.currentWeight || !profile.heightFt || !profile.age) return null;
  const wtKg = profile.currentWeight * 0.453592;
  const htCm = profile.heightFt * 30.48 + (profile.heightIn || 0) * 2.54;
  // Mifflin-St Jeor BMR
  const bmr = profile.sex === 'F'
    ? 10 * wtKg + 6.25 * htCm - 5 * profile.age - 161
    : 10 * wtKg + 6.25 * htCm - 5 * profile.age + 5;
  const actMult = {sed:1.2, light:1.375, mod:1.55, active:1.725}[profile.activity] || 1.55;
  const tdee = Math.round(bmr * actMult);

  const goalDiff = (profile.goalWeight || profile.currentWeight) - profile.currentWeight;
  let calories = tdee;
  if (goalDiff < -5) calories = tdee - 500;       // lose weight
  else if (goalDiff > 5) calories = tdee + 300;    // lean bulk
  // else maintain

  // Macros
  const proteinG  = Math.round(profile.goalWeight || profile.currentWeight); // 1g per lb goal weight
  const proteinCal = proteinG * 4;
  const fatCal    = Math.round(calories * 0.28);
  const fatG      = Math.round(fatCal / 9);
  const carbCal   = calories - proteinCal - fatCal;
  const carbG     = Math.round(carbCal / 4);

  const goal = goalDiff < -5 ? 'cut' : goalDiff > 5 ? 'bulk' : 'maintain';
  return { calories, proteinG, carbG, fatG, tdee, bmr: Math.round(bmr), goal };
}

// ── Totals for a day ───────────────────────────────────────
function getDayTotals(dateKey) {
  const meals = (S.nutrition && S.nutrition[dateKey]) || {};
  let cal=0, p=0, c=0, f=0;
  for (const meal of Object.values(meals)) {
    for (const item of (meal || [])) { cal+=item.cal; p+=item.p; c+=item.c; f+=item.f; }
  }
  return { cal:Math.round(cal), p:Math.round(p), c:Math.round(c), f:Math.round(f) };
}

// ── Render nutrition view ──────────────────────────────────
function renderNutrition() {
  if (!S.nutrition) S.nutrition = {};
  const profile = S.nutProfile || null;
  const targets = calcTargets(profile);
  const dateKey = nutDateKey(nutDateOffset);
  const totals  = getDayTotals(dateKey);
  const meals   = S.nutrition[dateKey] || {};
  const MEAL_NAMES = ['Breakfast','Lunch','Dinner','Snacks'];

  let html = '';

  // ── Profile setup ──
  const showSetup = !profile || !profile.currentWeight;
  html += `<div class="setup-card" id="setupCard" style="${showSetup ? '' : 'border-color:var(--border)'}">

      <div class="setup-field"><label>Activity Level</label>
        <select id="sp_act">

          <option value="light"  ${profile?.activity==='light' ?'selected':''}>Light (1–3x/week)</option>
          <option value="mod"    ${profile?.activity==='mod'   ?'selected':''}>Moderate (3–5x/week)</option>
          <option value="active" ${profile?.activity==='active'?'selected':''}>Very Active (6–7x/week)</option>
        </select></div>
    </div>
    <button class="save-setup-btn" onclick="saveNutProfile()">SAVE & CALCULATE</button>
    ${targets ? `<div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:12px;line-height:1.9">
      BMR: <span style="color:var(--text)">${targets.bmr} kcal</span> &nbsp;·&nbsp;
      TDEE: <span style="color:var(--text)">${targets.tdee} kcal</span> &nbsp;·&nbsp;
      Goal: <span style="color:var(--accent);text-transform:uppercase">${targets.goal}</span>
    </div>` : ''}
  </div>`;

  if (!targets) {
    document.getElementById('nutritionContent').innerHTML = html;
    return;
  }

  // ── Date nav ──
  html += `<div class="date-nav">
    <button class="date-nav-btn" onclick="nutDateOffset--;renderNutrition()">◀</button>
    <div class="date-nav-label">${nutDateLabel(nutDateOffset)} <span style="color:var(--muted);font-size:0.62rem">${dateKey}</span></div>

  </div>`;

  // ── Weight log ──

        </div>
        <div class="food-quick-list" id="flist_${meal.replace(' ','_')}">
          ${FOOD_DB.map(f=>`<div class="food-quick-chip" onclick="quickAdd('${meal}','${dateKey}',${JSON.stringify(f).replace(/"/g,"'")})">${f.n.split(' (')[0].split(' (')[0]}</div>`).join('')}
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase">Custom Entry</div>
        <div class="custom-food-grid">

          <input type="number" id="cf_c_${meal.replace(' ','_')}"    placeholder="Carb g" min="0">
          <input type="number" id="cf_f_${meal.replace(' ','_')}"    placeholder="Fat g" min="0">
        </div>
        <button class="log-food-btn" onclick="logCustomFood('${meal}','${dateKey}')">LOG FOOD</button>
      </div>
      ${items.map((item,idx)=>`
        <div class="food-entry">
          <div class="food-name">${item.n}</div>
          <div class="food-macro c">${item.cal} kcal</div>
          <div class="food-macro">P ${item.p}g</div>
          <div class="food-macro">C ${item.c}g</div>
          <div class="food-macro">F ${item.f}g</div>
          <button class="del-food" onclick="deleteFood('${meal}','${dateKey}',${idx})" title="Remove">✕</button>
        </div>`).join('')}
    </div>`;
  });

  document.getElementById('nutritionContent').innerHTML = html;
}

function saveNutProfile() {
  S.nutProfile = {
    currentWeight: parseFloat(document.getElementById('sp_cw').value) || 0,
    goalWeight:    parseFloat(document.getElementById('sp_gw').value) || 0,
    heightFt:      parseFloat(document.getElementById('sp_hft').value) || 0,
    heightIn:      parseFloat(document.getElementById('sp_hin').value) || 0,
    age:           parseInt(document.getElementById('sp_age').value) || 0,
    sex:           document.getElementById('sp_sex').value,
    activity:      document.getElementById('sp_act').value,
  };
  save(); renderNutrition();
}

function toggleDrawer(meal, dateKey) {
  activeDrawerMeal = activeDrawerMeal === meal ? null : meal;
  renderNutrition();
  if (activeDrawerMeal) {
    setTimeout(()=>{
      const el = document.getElementById('drawer_'+meal.replace(' ','_'));
      if (el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  }
}

function filterFoods(meal, dateKey) {
  const q = document.getElementById('fsearch_'+meal.replace(' ','_')).value.toLowerCase();
  const list = document.getElementById('flist_'+meal.replace(' ','_'));
  list.innerHTML = FOOD_DB
    .filter(f => f.n.toLowerCase().includes(q))
    .map(f=>`<div class="food-quick-chip" onclick="quickAdd('${meal}','${dateKey}',${JSON.stringify(f).replace(/"/g,"'")})">${f.n.split(' (')[0]}</div>`)
    .join('');
}

function quickAdd(meal, dateKey, food) {
  if (!S.nutrition[dateKey]) S.nutrition[dateKey] = {};
  if (!S.nutrition[dateKey][meal]) S.nutrition[dateKey][meal] = [];
  S.nutrition[dateKey][meal].push({n:food.n, cal:food.cal, p:food.p, c:food.c, f:food.f});
  save(); renderNutrition();
}

function logCustomFood(meal, dateKey) {
  const mk = meal.replace(' ','_');
  const n   = document.getElementById('cf_name_'+mk).value.trim() || 'Custom Food';
  const cal = parseFloat(document.getElementById('cf_cal_'+mk).value) || 0;
  const p   = parseFloat(document.getElementById('cf_p_'+mk).value)   || 0;
  const c   = parseFloat(document.getElementById('cf_c_'+mk).value)   || 0;
  const f   = parseFloat(document.getElementById('cf_f_'+mk).value)   || 0;
  if (!cal && !p && !c && !f) return;
  if (!S.nutrition[dateKey]) S.nutrition[dateKey] = {};
  if (!S.nutrition[dateKey][meal]) S.nutrition[dateKey][meal] = [];
  S.nutrition[dateKey][meal].push({n, cal, p, c, f});
  save(); renderNutrition();
}

function deleteFood(meal, dateKey, idx) {
  S.nutrition[dateKey][meal].splice(idx, 1);
  save(); renderNutrition();
}

function logWeight(dateKey) {
  const v = document.getElementById('wtInput').value;
  if (!v) return;
  if (!S.nutrition) S.nutrition = {};
  S.nutrition[`wt_${dateKey}`] = v;
  save(); renderNutrition();
}

renderToday();
</script>
</body>
</html>
